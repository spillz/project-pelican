<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Pelican Riding a Bicycle</title>
  <desc id="desc">A whimsical pelican riding a teal bicycle along a road with a sunny sky.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bfe9ff"/>
      <stop offset="100%" stop-color="#eefbff"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a8f95"/>
      <stop offset="100%" stop-color="#6f747a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="900" height="520" fill="url(#sky)"/>
  <circle cx="760" cy="90" r="42" fill="#ffe17a"/>
  <rect y="380" width="900" height="140" fill="url(#road)"/>
  <rect y="430" width="900" height="8" fill="#f4f4f4" opacity="0.65"/>
  <rect y="430" width="70" height="8" x="70" fill="#fefefe"/>
  <rect y="430" width="70" height="8" x="210" fill="#fefefe"/>
  <rect y="430" width="70" height="8" x="350" fill="#fefefe"/>
  <rect y="430" width="70" height="8" x="490" fill="#fefefe"/>
  <rect y="430" width="70" height="8" x="630" fill="#fefefe"/>
  <rect y="430" width="70" height="8" x="770" fill="#fefefe"/>
  <!-- Bicycle wheels -->
  <g filter="url(#softShadow)">
    <circle cx="300" cy="365" r="82" fill="none" stroke="#1d2a33" stroke-width="12"/>
    <circle cx="580" cy="365" r="82" fill="none" stroke="#1d2a33" stroke-width="12"/>
    <circle cx="300" cy="365" r="7" fill="#1d2a33"/>
    <circle cx="580" cy="365" r="7" fill="#1d2a33"/>
    <!-- Spokes -->
    <g stroke="#354753" stroke-width="3" opacity="0.8">
      <line x1="300" y1="365" x2="300" y2="287"/>
      <line x1="300" y1="365" x2="355" y2="312"/>
      <line x1="300" y1="365" x2="378" y2="365"/>
      <line x1="300" y1="365" x2="355" y2="418"/>
      <line x1="300" y1="365" x2="300" y2="443"/>
      <line x1="300" y1="365" x2="245" y2="418"/>
      <line x1="300" y1="365" x2="222" y2="365"/>
      <line x1="300" y1="365" x2="245" y2="312"/>
      <line x1="580" y1="365" x2="580" y2="287"/>
      <line x1="580" y1="365" x2="635" y2="312"/>
      <line x1="580" y1="365" x2="658" y2="365"/>
      <line x1="580" y1="365" x2="635" y2="418"/>
      <line x1="580" y1="365" x2="580" y2="443"/>
      <line x1="580" y1="365" x2="525" y2="418"/>
      <line x1="580" y1="365" x2="502" y2="365"/>
      <line x1="580" y1="365" x2="525" y2="312"/>
    </g>
    <!-- Bicycle frame -->
    <g fill="none" stroke="#12a3a8" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
      <line x1="300" y1="365" x2="430" y2="310"/>
      <line x1="430" y1="310" x2="520" y2="365"/>
      <line x1="520" y1="365" x2="300" y2="365"/>
      <line x1="430" y1="310" x2="430" y2="255"/>
      <line x1="430" y1="255" x2="500" y2="255"/>
      <line x1="500" y1="255" x2="580" y2="365"/>
      <line x1="520" y1="365" x2="580" y2="365"/>
      <line x1="500" y1="255" x2="535" y2="225"/>
      <line x1="535" y1="225" x2="595" y2="225"/>
    </g>
    <!-- Seat and handlebar -->
    <rect x="405" y="240" width="52" height="12" rx="6" fill="#1d2a33"/>
    <path d="M595 225 q30 -25 58 -5" fill="none" stroke="#1d2a33" stroke-width="8" stroke-linecap="round"/>
    <!-- Crank and pedals -->
    <circle cx="520" cy="365" r="16" fill="none" stroke="#1d2a33" stroke-width="8"/>
    <line x1="520" y1="365" x2="546" y2="350" stroke="#1d2a33" stroke-width="6" stroke-linecap="round"/>
    <line x1="520" y1="365" x2="495" y2="381" stroke="#1d2a33" stroke-width="6" stroke-linecap="round"/>
    <rect x="544" y="344" width="18" height="8" rx="3" fill="#1d2a33"/>
    <rect x="478" y="377" width="18" height="8" rx="3" fill="#1d2a33"/>
  </g>
  <!-- Pelican -->
  <g transform="translate(0,-8)" filter="url(#softShadow)">
    <!-- legs on pedals -->
    <path d="M470 280 q18 38 44 67" fill="none" stroke="#d59e66" stroke-width="10" stroke-linecap="round"/>
    <path d="M445 286 q2 36 -26 77" fill="none" stroke="#d59e66" stroke-width="10" stroke-linecap="round"/>
    <!-- body -->
    <ellipse cx="430" cy="205" rx="100" ry="72" fill="#f9f6ef" stroke="#2a3540" stroke-width="5"/>
    <path d="M356 210 q68 58 146 9 q-8 43 -60 54 q-60 12 -86 -30 z" fill="#dbe2ea" opacity="0.95"/>
    <!-- wing -->
    <path d="M400 190 q48 -24 80 20 q-5 42 -56 43 q-40 -4 -54 -33 q8 -20 30 -30z"
          fill="#bfc8d3" stroke="#2a3540" stroke-width="4"/>
    <!-- neck + head -->
    <path d="M500 195 q58 -50 31 -111 q-3 -12 10 -18 q14 -5 21 5 q30 84 -34 147"
          fill="#f9f6ef" stroke="#2a3540" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="546" cy="78" rx="37" ry="31" fill="#f9f6ef" stroke="#2a3540" stroke-width="5"/>
    <!-- eye -->
    <circle cx="557" cy="73" r="5" fill="#192027"/>
    <circle cx="559" cy="71" r="1.6" fill="#fff"/>
    <!-- beak -->
    <path d="M574 84 q78 -4 104 19 q-24 18 -102 26 q-14 -18 -2 -45z"
          fill="#f0b35a" stroke="#2a3540" stroke-width="5"/>
    <path d="M573 98 q76 7 89 26 q-51 19 -96 13 q-7 -19 7 -39z"
          fill="#ef8f4a" stroke="#2a3540" stroke-width="4"/>
    <!-- beak pouch -->
    <path d="M560 96 q-10 39 24 56 q44 14 78 -4 q-50 -1 -88 -25 q-8 -12 -14 -27z"
          fill="#f6d8a6" opacity="0.9"/>
    <!-- rider posture: wing to handlebar -->
    <path d="M488 198 q60 8 112 26" fill="none" stroke="#d59e66" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- motion lines -->
  <g stroke="#6fa8bd" stroke-width="4" stroke-linecap="round" opacity="0.6">
    <line x1="145" y1="182" x2="85" y2="190"/>
    <line x1="148" y1="214" x2="70" y2="228"/>
    <line x1="150" y1="247" x2="92" y2="258"/>
  </g>
</svg>